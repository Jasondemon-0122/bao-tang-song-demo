<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp Bài - Bảo Tàng Sống</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, select, button { width: 100%; margin-top: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #218838; }
        .nav-link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏛️ Nộp Sản Phẩm AR</h2>
        <form id="uploadForm">
            <select name="lop" id="lop" required>
                <option value="">-- Chọn Lớp Của Bạn --</option>
                <option value="11A1">Lớp 11A1</option>
                <option value="11A2">Lớp 11A2</option>
                <option value="11A3">Lớp 11A3</option>
            </select>
            <input type="text" name="tenNhom" id="tenNhom" placeholder="Tên Nhóm (VD: Nhóm 1)" required>
            
            <div style="text-align: left; margin-top: 15px;">
                <label>1. Ảnh chân dung (Image Target):</label>
                <input type="file" name="image" accept="image/*" required>
            </div>
            <div style="text-align: left; margin-top: 15px;">
                <label>2. Video lồng tiếng (Dưới 10MB):</label>
                <input type="file" name="video" accept="video/mp4" required>
            </div>
            <div style="text-align: left; margin-top: 15px;">
                <label>3. File nhận diện (.mind):</label>
                <input type="file" name="mind" accept=".mind" required>
            </div>

            <button type="submit" id="submitBtn">🚀 Đẩy Lên Đám Mây</button>
            <p id="status" style="color: #e74c3c; font-weight: bold; display: none;">Đang xử lý, vui lòng đợi...</p>
        </form>
        <a href="/trien-lam.html" class="nav-link">👉 Đến Phòng Triển Lãm</a>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('status').style.display = 'block';

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/nop-bai', { method: 'POST', body: formData });
                const result = await res.json();
                alert(result.message);
                if(result.success) window.location.reload();
            } catch (err) {
                alert("Lỗi kết nối mạng!");
            }
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('status').style.display = 'none';
        };
    </script>
</body>
</html>
