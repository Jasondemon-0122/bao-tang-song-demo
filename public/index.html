<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Tàng Sống - Trạm Tiếp Nhận</title>
    <link rel="stylesheet" href="/style.css">
    
    <style>
        body { background-color: var(--uber-white); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px;}
        .container { padding: 40px 32px; border-radius: 12px; box-shadow: var(--shadow-light); width: 100%; max-width: 460px; }
        p.subtitle { color: var(--text-gray); font-size: 16px; margin: 0 0 32px 0; }
        .input-group { margin-bottom: 24px; text-align: left; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--uber-black);}
        .sub-label { display: block; font-size: 12px; font-weight: 400; color: var(--text-gray); margin-bottom: 8px;}
        input[type="text"], select, input[type="file"] { width: 100%; padding: 14px 16px; box-sizing: border-box;}
        textarea { width: 100%; padding: 14px 16px; box-sizing: border-box; border: 1px solid var(--uber-black); border-radius: 8px; font-family: 'Inter', sans-serif; resize: vertical; min-height: 80px;}
        .btn-primary { padding: 16px 24px; width: 100%; margin-top: 10px; }
        .nav-link { display: inline-block; margin-top: 24px; color: var(--uber-black); text-decoration: none; font-weight: 500; font-size: 16px; background: var(--gray-chip); padding: 12px 24px; border-radius: 999px; transition: 0.2s; }
        .nav-link:hover { background: var(--gray-hover); }
        #status { color: #28a745; font-weight: 500; display: none; margin-top: 16px; font-size: 14px; text-align: center;}
        
        .hotspot-box { background: #fafafa; padding: 16px; border-radius: 8px; border: 1px dashed #afafaf; margin-bottom: 16px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>🏛️ Gửi Tác Phẩm</h2>
        <p class="subtitle">Khởi tạo không gian AR của bạn.</p>

        <form id="uploadForm">
            <div class="input-group">
                <label>Tên nhóm của bạn</label>
                <input type="text" name="tenNhom" placeholder="VD: Nhóm 1" required>
            </div>
            
            <div class="input-group">
                <label>🖼️ Ảnh chân dung (.jpg/.png)</label>
                <input type="file" name="image" id="imageInput" accept="image/*" required>
            </div>
            
            <div class="input-group">
                <label>🎬 Video thuyết minh (Tối đa 15MB)</label>
                <input type="file" name="video" accept="video/mp4" required>
            </div>

            <!-- Khu vực nhập nội dung Điểm chạm -->
            <div class="input-group">
                <label>📍 Điểm chạm 1 (Xuất hiện bên trái AR)</label>
                <span class="sub-label">Giải thích một từ khóa khó hoặc sự kiện phụ.</span>
                <div class="hotspot-box">
                    <input type="text" name="hs1Title" placeholder="Tiêu đề (VD: Góc Giải Nghĩa 📚)" style="margin-bottom: 8px;" required>
                    <textarea name="hs1Content" placeholder="Nội dung chi tiết (VD: Samurai là gì...)" required></textarea>
                </div>
            </div>

            <div class="input-group">
                <label>📍 Điểm chạm 2 (Xuất hiện bên phải AR)</label>
                <span class="sub-label">Đưa ra một câu hỏi hoặc thông tin ẩn.</span>
                <div class="hotspot-box">
                    <input type="text" name="hs2Title" placeholder="Tiêu đề (VD: Bí mật Lịch sử 🔍)" style="margin-bottom: 8px;" required>
                    <textarea name="hs2Content" placeholder="Nội dung chi tiết..." required></textarea>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">Tạo bản sao AR</button>
            <p id="status">Đang chuẩn bị dữ liệu...</p>
        </form>
        
        <div style="text-align: center;">
            <a href="/trien-lam.html" class="nav-link">Tham quan bảo tàng →</a>
        </div>
    </div>

    <script type="module">
        import { Compiler } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js';

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusText = document.getElementById('status');
            
            submitBtn.style.display = 'none';
            statusText.style.display = 'block';
            statusText.style.color = '#e74c3c';
            statusText.innerText = "Đang nạp ảnh vào hệ thống...";

            try {
                const formData = new FormData(e.target);
                const imageFile = formData.get('image');
                
                const img = new Image();
                img.src = URL.createObjectURL(imageFile);
                await new Promise((resolve) => { img.onload = resolve; });

                statusText.innerText = "Đang phân tích hình ảnh AR (0%)...";
                
                const compiler = new Compiler();
                await compiler.compileImageTargets([img], (progress) => {
                    statusText.innerText = `Đang tạo dữ liệu AR (${Math.round(progress)}%)...`;
                });

                const exportedData = compiler.exportData();
                const mindBlob = new Blob([exportedData], { type: 'application/octet-stream' });
                formData.append('mind', mindBlob, 'targets.mind');

                statusText.innerText = "Đang đóng gói và đẩy lên đám mây...";
                const res = await fetch('/api/nop-bai', { method: 'POST', body: formData });
                const result = await res.json();
                
                if(result.success) {
                    statusText.style.color = '#28a745';
                    statusText.innerText = "Hoàn tất xuất sắc!";
                    alert(result.message);
                    window.location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                console.error("Lỗi chi tiết:", err);
                statusText.innerText = "Thất bại!";
                alert(`Lỗi: ${err.message}.`);
                submitBtn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
