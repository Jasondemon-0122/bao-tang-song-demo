<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Tàng Sống - Trạm Tiếp Nhận</title>
    <link rel="stylesheet" href="/style.css">
    
    <!-- ĐÃ XÓA thẻ <script src="..."> bị lỗi ở đây -->
    
    <style>
        body { background-color: var(--uber-white); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        .container { padding: 40px 32px; border-radius: 12px; box-shadow: var(--shadow-light); width: 100%; max-width: 420px; }
        p.subtitle { color: var(--text-gray); font-size: 16px; margin: 0 0 32px 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 14px 16px; box-sizing: border-box;}
        .btn-primary { padding: 16px 24px; width: 100%; margin-top: 10px; }
        .nav-link { display: inline-block; margin-top: 24px; color: var(--uber-black); text-decoration: none; font-weight: 500; font-size: 16px; background: var(--gray-chip); padding: 12px 24px; border-radius: 999px; transition: 0.2s; }
        .nav-link:hover { background: var(--gray-hover); }
        #status { color: #28a745; font-weight: 500; display: none; margin-top: 16px; font-size: 14px; text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <h2>🏛️ Gửi Tác Phẩm</h2>
        <p class="subtitle">Khởi tạo nhân vật lịch sử của bạn.</p>

        <form id="uploadForm">
            <div class="input-group">
                <input type="text" name="tenNhom" id="tenNhom" placeholder="Tên nhóm của bạn (VD: Nhóm 1)" required>
            </div>
            
            <div class="input-group">
                <label>🖼️ Ảnh chân dung (Định dạng .jpg/.png)</label>
                <input type="file" name="image" id="imageInput" accept="image/*" required>
            </div>
            
            <div class="input-group">
                <label>🎬 Video lồng tiếng (Tối đa 15MB)</label>
                <input type="file" name="video" accept="video/mp4" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">Tạo bản sao AR</button>
            <p id="status">Đang chuẩn bị dữ liệu...</p>
        </form>
        
        <div style="text-align: center;">
            <a href="/trien-lam.html" class="nav-link">Tham quan bảo tàng →</a>
        </div>
    </div>

    <!-- ĐÃ SỬA: Khai báo type="module" để trình duyệt cho phép chạy công nghệ AI hiện đại -->
    <script type="module">
        // Nhập khẩu trực tiếp công cụ Compiler từ máy chủ quốc tế
        import { Compiler } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js';

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusText = document.getElementById('status');
            
            submitBtn.style.display = 'none';
            statusText.style.display = 'block';
            statusText.style.color = '#e74c3c';
            statusText.innerText = "Đang nạp ảnh vào hệ thống...";

            try {
                const formData = new FormData(e.target);
                const imageFile = formData.get('image');
                
                const img = new Image();
                img.src = URL.createObjectURL(imageFile);
                await new Promise((resolve) => { img.onload = resolve; });

                statusText.innerText = "Đang phân tích hình ảnh AR (0%)...";
                
                // Kích hoạt bộ não AI vừa được nhập khẩu ở trên
                const compiler = new Compiler();
                await compiler.compileImageTargets([img], (progress) => {
                    statusText.innerText = `Đang tạo dữ liệu AR (${Math.round(progress)}%)... (Máy yếu có thể hơi giật)`;
                });

                const exportedData = compiler.exportData();
                const mindBlob = new Blob([exportedData], { type: 'application/octet-stream' });
                formData.append('mind', mindBlob, 'targets.mind');

                statusText.innerText = "Đang đóng gói và đẩy lên đám mây...";
                const res = await fetch('/api/nop-bai', { method: 'POST', body: formData });
                const result = await res.json();
                
                if(result.success) {
                    statusText.style.color = '#28a745';
                    statusText.innerText = "Hoàn tất xuất sắc!";
                    alert(result.message);
                    window.location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                console.error("Lỗi chi tiết:", err);
                statusText.innerText = "Thất bại!";
                alert(`Lỗi: ${err.message}. \n\nMẹo: Hãy thử nhấn phím F5 để tải lại trang, hoặc chọn một bức ảnh có dung lượng nhẹ hơn.`);
                submitBtn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
