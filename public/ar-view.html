<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>Trải nghiệm AR 3D</title>
    <script src="./js/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style> 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; } 
        #scene-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #ffffff; font-family: sans-serif; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-screen h2 { font-size: 28px; margin-bottom: 10px; }
        #start-screen p { font-size: 16px; color: #afafaf; margin-bottom: 30px; }
        
        #start-btn {
            padding: 16px 32px; font-size: 18px; font-weight: bold; background: #ffffff; color: #000000; 
            border: none; border-radius: 999px; cursor: pointer; transition: 0.2s;
        }
        #start-btn:active { transform: scale(0.95); }
    </style>
  </head>
  <body>
    <div id="start-screen">
        <h2>🏛️ Kích hoạt không gian AR</h2>
        <p>Hệ thống cần quyền mở camera để gọi nhân vật 3D xuất hiện.</p>
        <button id="start-btn">Mở Camera</button>
    </div>

    <div id="scene-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const modelUrl = urlParams.get('model');
        
        if(!id || !modelUrl || modelUrl === "null") {
            alert("Lỗi: Nhóm này chưa tải lên Mô hình 3D!");
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            
            // Ép khung 3D tràn viền tuyệt đối và nhúng mô hình .glb xoay 360 độ
            document.getElementById('scene-container').innerHTML = `
                <a-scene mindar-image="imageTargetSrc: /data/${id}/targets.mind; autoStart: true;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
                  <a-assets>
                    <a-asset-item id="avatarModel" src="${modelUrl}"></a-asset-item>
                  </a-assets>
                  
                  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
                  
                  <a-entity mindar-image-target="targetIndex: 0">
                    <!-- Gọi mô hình 3D ra, chỉnh kích thước và cho xoay tròn 360 độ -->
                    <a-entity gltf-model="#avatarModel" 
                              position="0 0 0" 
                              scale="0.5 0.5 0.5" 
                              rotation="0 0 0"
                              animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                    </a-entity>
                  </a-entity>
                </a-scene>
            `;
        });
    </script>
  </body>
</html>
