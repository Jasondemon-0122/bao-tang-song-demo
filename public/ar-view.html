<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <script src="./js/aframe.min.js"></script>
    <script src="/mindar/mindar-image-aframe.prod.js"></script>
    <style> 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; } 
        
        /* 1. SỬA LỖI MÀN HÌNH TRẮNG: Ép khung 3D tràn viền tuyệt đối */
        #scene-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            padding: 15px 30px; font-size: 18px; font-weight: bold; background: #e74c3c; color: white; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.3s;
        }
        #start-btn:active { transform: scale(0.95); }
    </style>
  </head>
  <body>
    <div id="start-screen">
        <h2>🏛️ Sẵn Sàng Quét AR</h2>
        <p>Trình duyệt yêu cầu bạn chạm vào màn hình để cấp quyền phát video lồng tiếng.</p>
        <button id="start-btn">Bắt Đầu Trải Nghiệm</button>
    </div>

    <!-- Khung chứa 3D giờ đã được ép kích thước -->
    <div id="scene-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const vid = urlParams.get('vid');
        
        if(!id || !vid) alert("Lỗi: Không tìm thấy bài học sinh!");

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            
            document.getElementById('scene-container').innerHTML = `
                <a-scene mindar-image="imageTargetSrc: /data/${id}/targets.mind; autoStart: true;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
                  <a-assets>
                    <video id="userVideo" src="${vid}" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
                  </a-assets>
                  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
                  <a-entity mindar-image-target="targetIndex: 0">
                    <!-- 2. SỬA LỖI MẤT HÌNH: Dùng a-plane (mặt phẳng) thay vì a-video -->
                    <a-plane material="src: #userVideo" position="0 0 0" height="1" width="1"></a-plane>
                  </a-entity>
                </a-scene>
            `;

            setTimeout(() => {
                const target = document.querySelector('[mindar-image-target]');
                const videoEl = document.getElementById('userVideo');
                
                // Mẹo "Mở khóa" hệ thống video ẩn của trình duyệt di động
                videoEl.play().then(() => { videoEl.pause(); }).catch(e => console.log(e));

                if(target) {
                    target.addEventListener("targetFound", () => videoEl.play());
                    target.addEventListener("targetLost", () => videoEl.pause());
                }
            }, 1000);
        });
    </script>
  </body>
</html>
