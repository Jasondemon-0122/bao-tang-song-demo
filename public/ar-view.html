<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Trải nghiệm AR - Bảo Tàng Sống</title>
    <script src="./js/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style> 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif;} 
        
        #scene-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* TIÊU DIỆT HOÀN TOÀN CÁC LỚP MÀNG CHẮN CẢM ỨNG */
        .mindar-ui-overlay { display: none !important; pointer-events: none !important; }
        canvas.a-canvas { pointer-events: auto !important; z-index: 10 !important; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #ffffff; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-screen h2 { font-size: 32px; margin-bottom: 8px; font-weight: 700;}
        #start-screen p { font-size: 16px; color: #afafaf; margin-bottom: 32px; line-height: 1.5;}
        #start-btn { padding: 16px 32px; font-size: 18px; font-weight: 500; background: #ffffff; color: #000000; border: none; border-radius: 999px; cursor: pointer; transition: 0.2s; font-family: inherit;}
        #start-btn:active { transform: scale(0.95); }

        #info-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; box-sizing: border-box; text-align: center; color: #000000;
        }
        .info-card { background: #ffffff; padding: 32px 24px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .info-card h3 { font-size: 24px; margin: 0 0 16px 0; font-weight: 700; color: #000000;}
        .info-card p { font-size: 16px; color: #4b4b4b; line-height: 1.5; margin-bottom: 32px;}
        .btn-black { background: #000000; color: #ffffff; border: none; padding: 14px 20px; width: 100%; border-radius: 999px; font-weight: 500; font-size: 16px; cursor: pointer; font-family: inherit;}
    </style>
  </head>
  <body>
    <div id="start-screen">
        <h2>🏛️ Kích hoạt không gian AR</h2>
        <p>Hướng camera vào ảnh chân dung.<br>Hãy chạm vào các <b>dấu cộng (+)</b> xuất hiện bên cạnh video để khám phá bí mật do chính nhóm tác giả biên soạn!</p>
        <button id="start-btn">Mở Camera Khám Phá</button>
    </div>

    <div id="info-modal">
        <div class="info-card">
            <h3 id="info-title">Tiêu đề</h3>
            <p id="info-content">Nội dung...</p>
            <button class="btn-black" onclick="closeInfo()">Đã hiểu</button>
        </div>
    </div>

    <div id="scene-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if(!id) alert("Lỗi: Không tìm thấy bài học sinh!");

        // Dạy hệ thống bắt cảm ứng cực nhạy
        AFRAME.registerComponent('hotspot-action', {
            schema: {
                title: {type: 'string', default: 'Thông tin'},
                content: {type: 'string', default: 'Nội dung...'}
            },
            init: function () {
                const triggerInfo = (e) => {
                    // Chặn hành vi nhấp nháy hoặc cuộn trang của điện thoại
                    if(e) e.preventDefault(); 
                    
                    document.getElementById('info-title').innerText = decodeURIComponent(this.data.title);
                    document.getElementById('info-content').innerText = decodeURIComponent(this.data.content);
                    document.getElementById('info-modal').style.display = 'flex';
                };
                
                // Lắng nghe cả sự kiện nhấn chuột và chạm tay lên màn hình
                this.el.addEventListener('click', triggerInfo);
                this.el.addEventListener('touchstart', triggerInfo);
            }
        });

        window.closeInfo = function() {
            document.getElementById('info-modal').style.display = 'none';
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            const startBtn = document.getElementById('start-btn');
            startBtn.innerText = "Đang tải dữ liệu...";
            startBtn.disabled = true;

            try {
                // Thêm đoạn mã thời gian để CHỐNG LƯU ĐỆM JSON (đảm bảo luôn tải text mới nhất)
                const res = await fetch(`/data/${id}/links.json?t=` + new Date().getTime());
                const studentData = await res.json();

                document.getElementById('start-screen').style.display = 'none';
                
                const safeHs1Title = encodeURIComponent(studentData.hs1Title);
                const safeHs1Content = encodeURIComponent(studentData.hs1Content);
                const safeHs2Title = encodeURIComponent(studentData.hs2Title);
                const safeHs2Content = encodeURIComponent(studentData.hs2Content);

                // CHÚ Ý SỰ KHÁC BIỆT TẠI THẺ <a-scene>: Chuyển cursor và raycaster ra đây
                document.getElementById('scene-container').innerHTML = `
                    <a-scene mindar-image="imageTargetSrc: /data/${id}/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;" 
                             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
                             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
                             cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable; far: 10000;">
                      
                      <a-assets>
                        <video id="userVideo" src="${studentData.video}" crossorigin="anonymous" playsinline webkit-playsinline loop></video>
                      </a-assets>
                      
                      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
                      
                      <a-entity mindar-image-target="targetIndex: 0">
                        <a-plane material="src: #userVideo" position="0 0 0" height="1" width="1"></a-plane>

                        <!-- ĐIỂM CHẠM 1: Hình tròn lớn bán kính 0.3 (hứng cảm ứng), opacity 0.01 để chống lỗi tàng hình xuyên thấu -->
                        <a-entity class="clickable" position="-0.7 0 0.05" geometry="primitive: circle; radius: 0.3" material="color: #ffffff; opacity: 0.01; transparent: true" hotspot-action="title: ${safeHs1Title}; content: ${safeHs1Content}">
                            <!-- Dấu cộng nhỏ bên trong chỉ để hiển thị -->
                            <a-circle radius="0.12" color="#ffffff" opacity="0.9" animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 800; loop: true">
                                <a-text value="+" align="center" position="0 0 0.01" color="#000000" scale="0.8 0.8 0.8" font="kelsonsans"></a-text>
                            </a-circle>
                        </a-entity>

                        <!-- ĐIỂM CHẠM 2 -->
                        <a-entity class="clickable" position="0.7 0 0.05" geometry="primitive: circle; radius: 0.3" material="color: #ffffff; opacity: 0.01; transparent: true" hotspot-action="title: ${safeHs2Title}; content: ${safeHs2Content}">
                            <a-circle radius="0.12" color="#ffffff" opacity="0.9" animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 800; loop: true">
                                <a-text value="+" align="center" position="0 0 0.01" color="#000000" scale="0.8 0.8 0.8" font="kelsonsans"></a-text>
                            </a-circle>
                        </a-entity>
                        
                      </a-entity>
                    </a-scene>
                `;

                setTimeout(() => {
                    const target = document.querySelector('[mindar-image-target]');
                    const videoEl = document.getElementById('userVideo');
                    videoEl.play().then(() => { videoEl.pause(); }).catch(e => console.log(e));

                    if(target) {
                        target.addEventListener("targetFound", () => videoEl.play());
                        target.addEventListener("targetLost", () => videoEl.pause());
                    }
                }, 1000);

            } catch (error) {
                alert("Lỗi: Không thể lấy dữ liệu Điểm chạm của nhóm này!");
                startBtn.innerText = "Thử lại";
                startBtn.disabled = false;
            }
        });
    </script>
  </body>
</html>
