<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Trải nghiệm AR - Bảo Tàng Sống</title>
    <script src="./js/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style> 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif;} 
        #scene-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .mindar-ui-overlay { display: none !important; pointer-events: none !important; }
        canvas.a-canvas { pointer-events: auto !important; z-index: 10 !important; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; text-align: center; padding: 20px; box-sizing: border-box; }
        #start-screen h2 { font-size: 32px; margin-bottom: 8px; font-weight: 700;}
        #start-screen p { font-size: 16px; color: #afafaf; margin-bottom: 32px; line-height: 1.5;}
        #start-btn { padding: 16px 32px; font-size: 18px; font-weight: 500; background: #ffffff; color: #000000; border: none; border-radius: 999px; cursor: pointer; transition: 0.2s; font-family: inherit;}
        #start-btn:active { transform: scale(0.95); }

        .side-panel { position: absolute; top: 50%; transform: translateY(-50%) scale(0.7); width: calc(50vw - 24px); max-width: 280px; min-width: 150px; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); padding: 20px 16px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.1); z-index: 10000; opacity: 0; pointer-events: none; color: #000000; }
        #panel-left { left: 50%; margin-left: -10%; }
        #panel-right { right: 50%; margin-right: -10%; }
        #panel-left.show { left: 12px; margin-left: 0; opacity: 1; transform: translateY(-50%) scale(1); pointer-events: auto; }
        #panel-right.show { right: 12px; margin-right: 0; opacity: 1; transform: translateY(-50%) scale(1); pointer-events: auto; }
        .side-panel h3 { font-size: 16px; margin: 0 0 8px 0; font-weight: 700; line-height: 1.3; padding-right: 20px; color: #000000;}
        .side-panel .content-box { font-size: 13px; color: #333333; line-height: 1.5; max-height: 40vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 18px; color: #888; cursor: pointer; padding: 0; line-height: 1;}
        .close-btn:active { color: #000; }

        /* THANH ĐIỀU CHỈNH KÍCH THƯỚC (SCALE) */
        #scale-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            padding: 14px 20px; border-radius: 999px;
            display: none; /* Chỉ hiện khi có mô hình */
            align-items: center; justify-content: space-between; z-index: 9999;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        #scale-container label { font-size: 14px; font-weight: 700; color: #000; display: flex; align-items: center; gap: 8px;}
        #scale-slider { flex-grow: 1; margin-left: 16px; accent-color: #000; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="start-screen">
        <h2>🏛️ Kích hoạt không gian AR</h2>
        <p>Hướng camera vào ảnh chân dung.<br>Vuốt ngón tay để xoay, kéo thanh bên dưới để phóng to 3D!</p>
        <button id="start-btn">Mở Camera Khám Phá</button>
    </div>

    <div id="scale-container">
        <label>🔍 Thu/Phóng</label>
        <input type="range" id="scale-slider" min="0.1" max="3.0" step="0.1" value="0.5">
    </div>

    <div class="side-panel" id="panel-left">
        <button class="close-btn" onclick="closePanel('left')">✖</button>
        <h3 id="title-left">Tiêu đề</h3>
        <div class="content-box" id="content-left">Nội dung...</div>
    </div>

    <div class="side-panel" id="panel-right">
        <button class="close-btn" onclick="closePanel('right')">✖</button>
        <h3 id="title-right">Tiêu đề</h3>
        <div class="content-box" id="content-right">Nội dung...</div>
    </div>

    <div id="scene-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if(!id) alert("Lỗi: Không tìm thấy bài học sinh!");

        AFRAME.registerComponent('drag-rotate-model', {
          schema: { speed: {default: 1.5} },
          init: function () {
            this.ifMouseDown = false;
            this.x_cord = 0;
            this.y_cord = 0;
            this.el.addEventListener('mousedown', this.OnDocumentMouseDown.bind(this));
            this.el.sceneEl.addEventListener('mouseup', this.OnDocumentMouseUp.bind(this));
            this.el.sceneEl.addEventListener('mousemove', this.OnDocumentMouseMove.bind(this));
            this.el.addEventListener('touchstart', this.OnDocumentMouseDown.bind(this));
            this.el.sceneEl.addEventListener('touchend', this.OnDocumentMouseUp.bind(this));
            this.el.sceneEl.addEventListener('touchmove', this.OnDocumentMouseMove.bind(this));
          },
          OnDocumentMouseDown: function (event) {
            this.ifMouseDown = true;
            this.x_cord = event.clientX || (event.touches ? event.touches[0].clientX : 0);
            this.y_cord = event.clientY || (event.touches ? event.touches[0].clientY : 0);
          },
          OnDocumentMouseUp: function () { this.ifMouseDown = false; },
          OnDocumentMouseMove: function (event) {
            if (this.ifMouseDown) {
              var temp_x = event.clientX || (event.touches ? event.touches[0].clientX : 0);
              var temp_y = event.clientY || (event.touches ? event.touches[0].clientY : 0);
              if(!temp_x || !temp_y) return;
              
              var x_temp = temp_x - this.x_cord;
              this.el.object3D.rotation.y += x_temp * this.data.speed * 0.01;
              
              this.x_cord = temp_x;
              this.y_cord = temp_y;
            }
          }
        });

        AFRAME.registerComponent('hotspot-action', {
            schema: {
                title: {type: 'string', default: 'Thông tin'},
                content: {type: 'string', default: 'Nội dung...'},
                side: {type: 'string', default: 'left'} 
            },
            init: function () {
                const triggerInfo = (e) => {
                    if(e) e.preventDefault(); 
                    const side = this.data.side; 
                    document.getElementById('title-' + side).innerText = decodeURIComponent(this.data.title);
                    document.getElementById('content-' + side).innerText = decodeURIComponent(this.data.content);
                    document.getElementById('panel-' + side).classList.add('show');
                };
                this.el.addEventListener('click', triggerInfo);
                this.el.addEventListener('touchstart', triggerInfo);
            }
        });

        window.closePanel = function(side) {
            document.getElementById('panel-' + side).classList.remove('show');
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            const startBtn = document.getElementById('start-btn');
            startBtn.innerText = "Đang tải dữ liệu...";
            startBtn.disabled = true;

            try {
                const res = await fetch(`/data/${id}/links.json?t=` + new Date().getTime());
                const studentData = await res.json();

                document.getElementById('start-screen').style.display = 'none';
                
                const safeHs1Title = encodeURIComponent(studentData.hs1Title);
                const safeHs1Content = encodeURIComponent(studentData.hs1Content);
                const safeHs2Title = encodeURIComponent(studentData.hs2Title);
                const safeHs2Content = encodeURIComponent(studentData.hs2Content);

                let assetHTML = "";
                let renderHTML = "";
                
                if (studentData.video) {
                    assetHTML += `<video id="userVideo" src="${studentData.video}" crossorigin="anonymous" playsinline webkit-playsinline loop></video>`;
                    renderHTML += `<a-plane material="src: #userVideo" position="0 0 0" height="1" width="1"></a-plane>`;
                }

                if (studentData.model) {
                    // Bật hiển thị thanh trượt khi phát hiện có mô hình 3D
                    document.getElementById('scale-container').style.display = 'flex';

                    assetHTML += `<a-asset-item id="userModel" src="${studentData.model}" crossorigin="anonymous" response-type="arraybuffer"></a-asset-item>`;
                    let positionY = studentData.video ? "-0.7" : "0"; 
                    
                    // Gắn id="ar-model" để thanh kéo gọi tới
                    renderHTML += `<a-entity id="ar-model" gltf-model="#userModel" position="0 ${positionY} 0.1" scale="0.5 0.5 0.5" class="clickable" drag-rotate-model></a-entity>`;
                }

                document.getElementById('scene-container').innerHTML = `
                    <a-scene mindar-image="imageTargetSrc: /data/${id}/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;" 
                             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
                             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
                             cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable; far: 10000;">
                      
                      <a-assets>
                        ${assetHTML}
                      </a-assets>
                      
                      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
                      
                      <a-entity mindar-image-target="targetIndex: 0">
                        ${renderHTML}

                        <a-entity class="clickable" position="-0.7 0 0.05" geometry="primitive: circle; radius: 0.3" material="color: #ffffff; opacity: 0.01; transparent: true" hotspot-action="title: ${safeHs1Title}; content: ${safeHs1Content}; side: left">
                            <a-circle radius="0.12" color="#ffffff" opacity="0.9" animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 800; loop: true"><a-text value="+" align="center" position="0 0 0.01" color="#000000" scale="0.8 0.8 0.8" font="kelsonsans"></a-text></a-circle>
                        </a-entity>
                        <a-entity class="clickable" position="0.7 0 0.05" geometry="primitive: circle; radius: 0.3" material="color: #ffffff; opacity: 0.01; transparent: true" hotspot-action="title: ${safeHs2Title}; content: ${safeHs2Content}; side: right">
                            <a-circle radius="0.12" color="#ffffff" opacity="0.9" animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 800; loop: true"><a-text value="+" align="center" position="0 0 0.01" color="#000000" scale="0.8 0.8 0.8" font="kelsonsans"></a-text></a-circle>
                        </a-entity>
                        
                      </a-entity>
                    </a-scene>
                `;

                // BẮT SỰ KIỆN KÉO THANH TRƯỢT -> ĐỔI SIZE 3D THỰC TẾ
                setTimeout(() => {
                    const scaleSlider = document.getElementById('scale-slider');
                    const arModel = document.getElementById('ar-model');
                    
                    if (scaleSlider && arModel) {
                        scaleSlider.addEventListener('input', (e) => {
                            const val = parseFloat(e.target.value);
                            // Set kích thước X, Y, Z bằng với giá trị kéo của thanh
                            arModel.setAttribute('scale', `${val} ${val} ${val}`);
                        });
                    }

                    // Phát video nếu có
                    const target = document.querySelector('[mindar-image-target]');
                    const videoEl = document.getElementById('userVideo');
                    if (videoEl) {
                        videoEl.play().then(() => { videoEl.pause(); }).catch(e => console.log(e));
                        if(target) {
                            target.addEventListener("targetFound", () => videoEl.play());
                            target.addEventListener("targetLost", () => videoEl.pause());
                        }
                    }
                }, 1000);

            } catch (error) {
                alert("Lỗi: Không thể lấy dữ liệu của nhóm này!");
                startBtn.innerText = "Thử lại";
                startBtn.disabled = false;
            }
        });
    </script>
  </body>
</html>
