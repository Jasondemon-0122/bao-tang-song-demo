<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Triển Lãm AR</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #333; }
        #gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 250px; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .card button { background: #007bff; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #lock-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #2c3e50; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #lock-screen select, #lock-screen input { padding: 12px; font-size: 16px; margin: 10px 0; border-radius: 5px; width: 250px; }
        #lock-screen button { padding: 12px 25px; font-size: 16px; font-weight: bold; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <h2>🔒 Cửa Vào Triển Lãm</h2>
        <select id="lopSelect">
            <option value="11A1">Lớp 11A1</option>
            <option value="11A2">Lớp 11A2</option>
            <option value="11A3">Lớp 11A3</option>
        </select>
        <input type="password" id="passInput" placeholder="Mật khẩu của lớp...">
        <button onclick="checkPass()">Mở Khóa</button>
        <p id="passError" style="color: #ff6b6b; display: none;">❌ Sai mật khẩu!</p>
        <a href="/" style="color: #bdc3c7; margin-top: 20px;">🔙 Quay lại</a>
    </div>

    <a href="/" style="display: block; text-align: center; color: #28a745; font-weight: bold; text-decoration: none;">🔙 Trở lại Nộp Bài</a>
    <h1 id="tieuDe">🖼️ Phòng Triển Lãm</h1>
    <div id="gallery"></div>

    <script>
        async function checkPass() {
            const lop = document.getElementById('lopSelect').value;
            const password = document.getElementById('passInput').value;
            
            const res = await fetch('/api/trien-lam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lop, password })
            });
            const result = await res.json();

            if(result.success) {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('tieuDe').innerText = `🖼️ Phòng Triển Lãm - ${lop}`;
                renderGallery(result.data);
            } else {
                document.getElementById('passError').style.display = "block";
            }
        }

        function renderGallery(students) {
            const gallery = document.getElementById('gallery');
            if(students.length === 0) return gallery.innerHTML = "Lớp này chưa có nhóm nào nộp bài.";

            students.forEach(student => {
                gallery.innerHTML += `
                    <div class="card">
                        <h3>${student.tenNhom}</h3>
                        <img src="${student.image}">
                        <button onclick="openAR('${student.mind}', '${student.video}')">📷 Bật Camera AR</button>
                    </div>
                `;
            });
        }

        function openAR(mindUrl, videoUrl) {
            window.location.href = `/ar-view.html?mind=${encodeURIComponent(mindUrl)}&vid=${encodeURIComponent(videoUrl)}`;
        }
    </script>
</body>
</html>
