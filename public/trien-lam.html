<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Triển Lãm AR - Bảo Tàng Sống</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background-color: #fafafa; padding: 0 20px 60px 20px;}
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid var(--gray-hover); margin-bottom: 40px; }
        h1 { font-size: 36px; letter-spacing: -0.5px;}
        .btn-back { background: var(--gray-chip); color: var(--uber-black); text-decoration: none; padding: 10px 20px; border-radius: 999px; font-weight: 500; font-size: 14px; transition: 0.2s; }
        .btn-back:hover { background: var(--gray-hover); }
        
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1136px; margin: 0 auto; }
        
        .card { background: var(--uber-white); padding: 16px; border-radius: 8px; box-shadow: var(--shadow-light); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; margin-bottom: 16px; }
        .card h3 { font-size: 20px; margin: 0 0 16px 0; }
        .card button { padding: 14px; width: 100%; font-size: 16px; margin-top: auto; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <h2>🔒 Khu Vực Trưng Bày</h2>
        <p>Vui lòng nhập mã bảo mật của không gian này.</p>
        <input type="password" id="passInput" placeholder="Nhập mã bí mật...">
        <button onclick="checkPass()">Truy cập không gian</button>
        <p id="passError">Mã truy cập không hợp lệ.</p>
    </div>

    <div style="max-width: 1136px; margin: 0 auto;">
        <div class="header-bar">
            <h1>Phòng Triển Lãm</h1>
            <a href="/" class="btn-back">← Quay lại trạm</a>
        </div>
        <div id="gallery"></div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('passInput').value === "lichsu11") { 
                document.getElementById('lock-screen').style.display = "none";
                loadData(); 
            } else {
                document.getElementById('passError').style.display = "block";
            }
        }

        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPass();
        });

        async function loadData() {
            const res = await fetch('/api/danh-sach');
            const students = await res.json();
            const gallery = document.getElementById('gallery');
            
            if(students.length === 0) {
                gallery.innerHTML = "<p style='color: #4b4b4b;'>Chưa có tác phẩm nào được trưng bày tại đây.</p>";
                return;
            }

            gallery.innerHTML = '';
            students.forEach(student => {
                gallery.innerHTML += `
                    <div class="card">
                        <img src="${student.image}">
                        <h3>${student.name.replace(/_/g, ' ')}</h3>
                        <!-- Gọi hàm mở AR bằng model3d -->
                        <button onclick="openAR('${student.name}', '${student.model3d}')">Khởi động AR</button>
                    </div>
                `;
            });
        }

        function openAR(name, modelUrl) {
            window.location.href = `/ar-view.html?id=${name}&model=${encodeURIComponent(modelUrl)}`;
        }
    </script>
</body>
</html>
